<!-- Protótipo estático — tela /verificar-email. Aberto direto no navegador. Não é código de produção. -->
<!-- Segue doc/UX/00-identidade-visual.md, 01-design-tokens.md, 02-componentes-base.md. -->
<!-- Refina a tela já existente em src/main/resources/templates/verificar-email.html (US-006 §3). -->
<!-- Alpine.js: alterna estados (normal / reenviado / bloqueio) + cooldown de 30s no botão. -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>atrilha — protótipo confirmar e-mail</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>

  <style>
    /* =====================================================================
       TOKENS (subset literal de doc/UX/01-design-tokens.md)
       ===================================================================== */
    :root {
      --color-primary-50:  #FFF1F0;
      --color-primary-100: #FFD9D6;
      --color-primary-200: #FFBDB7;
      --color-primary-400: #FA7B71;
      --color-primary-500: #F25C54;
      --color-primary-600: #D94A43;
      --color-primary-700: #A8362F;

      --color-neutral-0:   #FFFFFF;
      --color-neutral-50:  #F7F4F1;
      --color-neutral-100: #EDE8E4;
      --color-neutral-200: #DCD6D0;
      --color-neutral-300: #C9C2BD;
      --color-neutral-400: #A39A93;
      --color-neutral-500: #7A716B;
      --color-neutral-700: #3D3733;
      --color-neutral-900: #1A1614;

      --color-success-100: #E2F4CB;
      --color-success-700: #3F7A0F;
      --color-warning-100: #FFF5DC;
      --color-warning-700: #9A5A00;
      --color-info-100:    #EAF7FB;
      --color-info-700:    #0E6C82;

      --color-bg:           var(--color-neutral-50);
      --color-surface:      var(--color-neutral-0);
      --color-surface-muted:var(--color-neutral-100);
      --color-border:       var(--color-neutral-300);
      --color-border-strong:var(--color-neutral-400);
      --color-divider:      var(--color-neutral-200);
      --color-text-display: var(--color-neutral-900);
      --color-text-body:    var(--color-neutral-700);
      --color-text-muted:   var(--color-neutral-500);
      --color-text-link:    var(--color-info-700);
      --color-primary:      var(--color-primary-500);
      --color-primary-hover:var(--color-primary-600);
      --color-primary-active:var(--color-primary-700);
      --color-on-primary:   var(--color-neutral-0);
      --color-focus-ring:   var(--color-primary-500);

      --font-display: "Bricolage Grotesque", "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-sans:    "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;

      --font-weight-regular:  400;
      --font-weight-medium:   500;
      --font-weight-semibold: 600;
      --font-weight-bold:     700;

      --text-xs:   0.75rem;
      --text-sm:   0.875rem;
      --text-base: 1rem;
      --text-lg:   1.125rem;
      --text-2xl:  1.5rem;

      --tracking-overline: 0.05em;

      --space-1:  0.25rem;
      --space-2:  0.5rem;
      --space-3:  0.75rem;
      --space-4:  1rem;
      --space-5:  1.25rem;
      --space-6:  1.5rem;
      --space-8:  2rem;
      --space-10: 2.5rem;
      --space-11: 2.75rem;
      --space-12: 3rem;

      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1.25rem;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px 0 rgba(26, 22, 20, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(26, 22, 20, 0.08), 0 2px 4px -2px rgba(26, 22, 20, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(26, 22, 20, 0.10), 0 4px 6px -4px rgba(26, 22, 20, 0.06);
      --shadow-focus: 0 0 0 3px rgba(242, 92, 84, 0.35);

      --duration-fast: 120ms;
      --duration-base: 240ms;
      --ease-out-soft: cubic-bezier(0.16, 1, 0.3, 1);
      --z-sticky: 20;
    }

    /* =====================================================================
       RESET mínimo
       ===================================================================== */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.5;
      color: var(--color-text-body);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    h1, h2, h3, p { margin: 0; }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    :focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
      border-radius: var(--radius-md);
    }
    [x-cloak] { display: none !important; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* =====================================================================
       Header — apenas marca (área autenticada — sem botão voltar)
       ===================================================================== */
    .header {
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-divider);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      min-height: 56px;
    }
    .header-brand {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-display);
      font-size: var(--text-base);
    }
    .brand-mark {
      width: 26px; height: 26px;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      color: var(--color-on-primary);
      display: inline-grid;
      place-items: center;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,.08);
    }
    .brand-mark svg { width: 15px; height: 15px; display: block; }

    /* =====================================================================
       Main + card central
       ===================================================================== */
    .main {
      padding: var(--space-10) var(--space-4) var(--space-10);
      max-width: 28rem;
      margin: 0 auto;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-xl);
      padding: var(--space-8) var(--space-6) var(--space-6);
      box-shadow: var(--shadow-md);
      text-align: center;
    }

    /* Ilustração do envelope — disco coral suave + glyph branco */
    .art {
      width: 96px;
      height: 96px;
      border-radius: var(--radius-full);
      margin: 0 auto var(--space-6);
      background:
        radial-gradient(circle at 30% 30%,
          var(--color-primary-200) 0%,
          var(--color-primary-100) 60%,
          var(--color-primary-100) 100%);
      display: grid;
      place-items: center;
      color: var(--color-primary-700);
      position: relative;
    }
    .art::after {
      /* selo decorativo no canto inferior-direito do envelope */
      content: "";
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 14px; height: 14px;
      border-radius: var(--radius-full);
      background: var(--color-primary-500);
      box-shadow: 0 0 0 3px var(--color-surface);
    }
    .art svg { width: 44px; height: 44px; display: block; }

    .overline {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-semibold);
      letter-spacing: var(--tracking-overline);
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-2);
    }
    .title {
      font-family: var(--font-display);
      font-weight: var(--font-weight-semibold);
      font-size: var(--text-2xl);
      line-height: 1.15;
      color: var(--color-text-display);
      margin-bottom: var(--space-3);
    }
    .lead {
      font-size: var(--text-base);
      color: var(--color-text-body);
      margin-bottom: var(--space-2);
    }
    .lead strong {
      color: var(--color-text-display);
      font-weight: var(--font-weight-semibold);
      word-break: break-all;
    }
    .helper {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }

    /* =====================================================================
       Alert (estados de reenvio)
       ===================================================================== */
    .alert {
      display: flex;
      gap: var(--space-3);
      align-items: flex-start;
      text-align: left;
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      line-height: 1.45;
      margin-bottom: var(--space-5);
    }
    .alert svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
    .alert--success { background: var(--color-success-100); color: var(--color-success-700); }
    .alert--warning { background: var(--color-warning-100); color: var(--color-warning-700); }

    /* =====================================================================
       Botões
       ===================================================================== */
    .actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      min-height: var(--space-12);
      padding: var(--space-3) var(--space-6);
      font-family: var(--font-sans);
      font-weight: var(--font-weight-semibold);
      font-size: var(--text-base);
      border-radius: var(--radius-full);
      transition: background-color var(--duration-fast) var(--ease-out-soft),
                  color var(--duration-fast) var(--ease-out-soft),
                  border-color var(--duration-fast) var(--ease-out-soft);
    }
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
    }
    .btn-primary:hover:not(:disabled) { background: var(--color-primary-hover); }
    .btn-primary:active:not(:disabled) { background: var(--color-primary-active); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--color-text-body);
    }
    .btn-ghost:hover { background: var(--color-surface-muted); }

    /* spinner do botão durante reenvio */
    .spinner {
      width: 18px; height: 18px;
      border-radius: var(--radius-full);
      border: 2px solid currentColor;
      border-right-color: transparent;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =====================================================================
       Painel de demonstração — só do protótipo
       ===================================================================== */
    .demo-bar {
      max-width: 28rem;
      margin: 0 auto;
      padding: var(--space-4) var(--space-4) 0;
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }
    .demo-bar span {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: var(--tracking-overline);
      color: var(--color-text-muted);
      font-weight: var(--font-weight-semibold);
    }
    .demo-chip {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-semibold);
      padding: var(--space-1) var(--space-3);
      min-height: var(--space-11);
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-body);
    }
    .demo-chip[aria-pressed="true"] {
      background: var(--color-primary-100);
      border-color: var(--color-primary);
      color: var(--color-primary-700);
    }
  </style>
</head>
<body x-data="verifyEmail()">

  <!-- =================================================================
       HEADER — apenas marca (área autenticada após signup).
       ================================================================= -->
  <header class="header" role="banner">
    <span class="header-brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12 L8 4 L13 12"/>
          <circle cx="8" cy="13" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </span>
      atrilha
    </span>
  </header>

  <!-- =================================================================
       BARRA DE DEMONSTRAÇÃO — alterna estados de reenvio.
       ================================================================= -->
  <div class="demo-bar" role="group" aria-label="Demonstração de estados (só protótipo)">
    <span>Estado:</span>
    <button type="button" class="demo-chip" :aria-pressed="(state==='normal').toString()"
            @click="setState('normal')">Normal</button>
    <button type="button" class="demo-chip" :aria-pressed="(state==='success').toString()"
            @click="setState('success')">Reenviado</button>
    <button type="button" class="demo-chip" :aria-pressed="(state==='rate-limited').toString()"
            @click="setState('rate-limited')">Bloqueio</button>
  </div>

  <!-- =================================================================
       MAIN — card de confirmação de e-mail.
       ================================================================= -->
  <main class="main">
    <article class="card">

      <!-- Ilustração decorativa. -->
      <div class="art" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none"
             xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8L12 13L21 8M5 19H19C20.1046 19 21 18.1046 21 17V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V17C3 18.1046 3.89543 19 5 19Z"
                stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <p class="overline">Falta pouco</p>
      <h1 class="title">Confirme teu e-mail</h1>
      <p class="lead">
        Enviamos um link pra <strong>dionialves@gmail.com</strong>
      </p>
      <p class="helper">Clica nele e voltamos a falar. O link vale por 24 horas.</p>

      <!-- Banners de estado (contrato testável: data-state) -->
      <div role="status" aria-live="polite">
        <div x-show="state==='success'" x-cloak
             data-state="resend-success" class="alert alert--success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 6 9 17l-5-5"/>
          </svg>
          <span>Reenviamos. Confere a tua caixa de entrada (e o spam).</span>
        </div>
        <div x-show="state==='rate-limited'" x-cloak
             role="alert" data-state="rate-limited" class="alert alert--warning">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
          </svg>
          <span>Ei, calma — espera alguns segundos antes do próximo reenvio.</span>
        </div>
      </div>

      <!-- Ações primária + secundária -->
      <div class="actions">
        <form @submit.prevent="resend()" novalidate>
          <button type="submit" class="btn btn-primary"
                  :disabled="loading || cooldown > 0"
                  data-test="cta-resend">
            <template x-if="loading">
              <span class="spinner" aria-hidden="true"></span>
            </template>
            <span x-show="!loading && cooldown === 0">Reenviar link</span>
            <span x-show="!loading && cooldown > 0"
                  x-text="'Aguarda ' + cooldown + 's'"></span>
            <span x-show="loading">Reenviando…</span>
          </button>
        </form>

        <a href="trilha.html" class="btn btn-ghost" data-test="cta-skip">
          Continuar mesmo assim
        </a>
      </div>
    </article>
  </main>

  <script>
    function verifyEmail() {
      return {
        state: 'normal',        // 'normal' | 'success' | 'rate-limited'
        loading: false,
        cooldown: 0,
        _tick: null,

        setState(next) {
          this.state = next;
          // limpa cooldown ao trocar de estado via demo-bar
          this.cooldown = 0;
          if (this._tick) { clearInterval(this._tick); this._tick = null; }
        },

        resend() {
          if (this.loading || this.cooldown > 0) return;
          this.loading = true;

          // simula chamada — 800ms
          setTimeout(() => {
            this.loading = false;
            this.state = 'success';
            this.startCooldown(30);
          }, 800);
        },

        startCooldown(seconds) {
          this.cooldown = seconds;
          if (this._tick) clearInterval(this._tick);
          this._tick = setInterval(() => {
            this.cooldown -= 1;
            if (this.cooldown <= 0) {
              clearInterval(this._tick);
              this._tick = null;
            }
          }, 1000);
        },
      };
    }
  </script>
</body>
</html>
