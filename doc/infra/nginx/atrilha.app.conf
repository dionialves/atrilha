# Nginx — atrilha.app
# Versao: chore-006
# Copiar para: /etc/nginx/sites-available/atrilha.app
# Symlink:     ln -s /etc/nginx/sites-available/atrilha.app /etc/nginx/sites-enabled/atrilha.app

server {
    listen 80;
    listen [::]:80;
    server_name atrilha.app www.atrilha.app;

    # ACME challenge para certbot (HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo o resto -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name atrilha.app www.atrilha.app;

    # Certbot preenche estas diretivas automaticamente apos "certbot --nginx".
    # Descomente manualmente apenas se precisar de configuracao manual:
    # ssl_certificate     /etc/letsencrypt/live/atrilha.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/atrilha.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    # Nota: HSTS declarado aqui no Nginx; NAO duplicar no Cloudflare.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10m;

    # Proxy para a aplicacao Spring Boot (porta 8084)
    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check — sem log para nao poluir (endpoint: /health, sem prefixo /actuator)
    location = /health {
        proxy_pass http://127.0.0.1:8084/health;
        access_log off;
    }
}
