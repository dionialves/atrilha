# docker-compose.prod.yml — Atrilha (producao)
# Versao: chore-006
#
# Uso na VPS:
#   cp infra/compose/docker-compose.prod.yml /opt/atrilha/docker-compose.yml
#   cp infra/compose/.env.example            /opt/atrilha/.env   # preencha os valores reais
#   cd /opt/atrilha
#   docker compose pull && docker compose up -d

services:
  postgres:
    image: postgres:18-alpine
    container_name: atrilha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - backend
    # Porta 5432 NAO publicada no host — acesso apenas pela rede interna "backend"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    image: ghcr.io/dionialves/atrilha:${APP_TAG:-latest}
    container_name: atrilha-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      # Apenas loopback — Nginx faz proxy externo
      - "127.0.0.1:8084:8084"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pg-data:
