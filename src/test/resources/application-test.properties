# Perfil "test" — usado por testes de smoke do contexto Spring que não tocam
# DB de verdade. Para testes que precisam de SQL Postgres (migrations,
# repositórios, service), usa-se PostgreSQLContainer + @DynamicPropertySource
# que sobrescreve o spring.datasource.url abaixo.

# H2 em memória — leve, basta para o JPA validar metadados durante o boot.
# Flyway é desabilitado aqui porque a sintaxe da V2 é Postgres-específica
# (CREATE UNIQUE INDEX ... WHERE ..., constraints com LOWER em coluna).
# IT tests sobrescrevem spring.datasource.url via @DynamicPropertySource para
# apontar a um Testcontainer Postgres — não definimos driver-class-name aqui
# para que Spring deduza a partir da URL.
spring.datasource.url=jdbc:h2:mem:atrilha-smoke;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Diretório base de mídia em testes.
app.media.upload-dir=${java.io.tmpdir}/atrilha-test-media
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# E-mail transacional em testes (US-006).
# Hospedeiro fake — JavaMailSender e criado, mas testes que enviam de fato
# sobrescrevem via @DynamicPropertySource (ex.: GreenMail nos *IT de notificacoes);
# testes de service usam @Primary com RecordingEmailSender, sem tocar SMTP.
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.test-connection=false
atrilha.mail.from=ola@atrilha.local
atrilha.base-url=http://localhost:8084
# Health indicator do mail-server desligado em testes (host fake nao responde).
management.health.mail.enabled=false

# fix-001: chain desligado no profile `test` global. O IT
# StaticAssetsFingerprintProdIT religa via @TestPropertySource para
# validar o comportamento de producao em isolamento. Os ITs
# existentes (StaticAssetsCssIT, StaticAssetsCssCoverageIT) que
# asseram href=/css/app.css literal continuam verdes.
spring.web.resources.chain.enabled=false

# Algumas suites de teste dependem do stub InMemoryLoginAccountQuery (testes
# unitarios originais da US-007). A flag abaixo o ativa para a suite default.
# Suites que validam o caminho JPA (FIX-013) sobrescrevem via @TestPropertySource.
atrilha.auth.seed.enabled=true

# Seeds determinísticas para testes.
atrilha.auth.seed.teen.email=teen@atrilha.test
atrilha.auth.seed.teen.password=test123
atrilha.auth.seed.teen.role=TEEN
atrilha.auth.seed.guardian-linked.email=guardian@atrilha.test
atrilha.auth.seed.guardian-linked.password=test123
atrilha.auth.seed.guardian-linked.role=GUARDIAN
atrilha.auth.seed.guardian-linked.has-guardian-link=true
atrilha.auth.seed.guardian-unlinked.email=guardian-new@atrilha.test
atrilha.auth.seed.guardian-unlinked.password=test123
atrilha.auth.seed.guardian-unlinked.role=GUARDIAN
