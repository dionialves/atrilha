spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.thymeleaf.cache=true
spring.web.resources.cache.cachecontrol.max-age=86400
# fix-001: fingerprint por conteudo (MD5) em todos os assets estaticos.
# O ResourceUrlEncodingFilter intercepta th:href="@{/css/app.css}" no
# Thymeleaf e reescreve para /css/app.<hash>.css. Quando o conteudo
# muda, o hash muda, a URL no HTML muda, e a CDN (Cloudflare) + o
# navegador veem MISS legitimo. Mantemos max-age=86400 acima porque
# agora a URL e imutavel-por-conteudo.
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
server.forward-headers-strategy=framework

app.media.upload-dir=${MEDIA_UPLOAD_DIR}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# SMTP provider real (SES/Mailgun/Postmark/SendGrid) — variaveis exigidas em
# tempo de boot. A escolha do provider e separada (chore aberto no backlog).
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
atrilha.mail.from=${MAIL_FROM}
atrilha.base-url=${BASE_URL}

# Cookie de sessão seguro (sobrescreve secure=false do base).
server.servlet.session.cookie.secure=true
# OAuth2 Google (US-002) — variaveis obrigatorias em producao.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET}
