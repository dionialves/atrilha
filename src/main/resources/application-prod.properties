spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.thymeleaf.cache=true
spring.web.resources.cache.cachecontrol.max-age=86400
server.forward-headers-strategy=framework

app.media.upload-dir=${MEDIA_UPLOAD_DIR}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# SMTP provider real (SES/Mailgun/Postmark/SendGrid) — variaveis exigidas em
# tempo de boot. A escolha do provider e separada (chore aberto no backlog).
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
atrilha.mail.from=${MAIL_FROM}
atrilha.base-url=${BASE_URL}
