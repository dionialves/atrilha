spring.datasource.url=jdbc:postgresql://localhost:5432/atrilha
spring.datasource.username=atrilha
spring.datasource.password=atrilha
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
# fix-001: chain desligado em dev — preserva URLs literais (/css/app.css)
# uteis para depuracao no DevTools. Producao usa fingerprint via
# application-prod.properties.
spring.web.resources.chain.enabled=false

app.media.upload-dir=/tmp/atrilha/media
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Import .env para teste em ambiente dev
spring.config.import=optional:file:./.env[.properties]

# SMTP local via Mailpit (docker-compose service `mailpit`).
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
atrilha.mail.from=ola@atrilha.local
atrilha.base-url=http://localhost:8084

# OAuth Google com credenciais de fallback dev (garante boot sem env vars).
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:dev-oauth-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:dev-oauth-client-secret}

