# Sessão (compartilhada por todos os perfis)
spring.session.store-type=cookie
server.servlet.session.timeout=30d
server.servlet.session.cookie.max-age=30d
server.servlet.session.cookie.http-only=true
# same-site=lax e secure=false em dev/test; prod sobrescreve com secure=true
server.servlet.session.cookie.same-site=lax

spring.application.name=atrilha
server.port=8084

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# E-mail transacional (US-006). Sobreposto pelos perfis dev/prod/test.
atrilha.mail.from=${MAIL_FROM:ola@atrilha.local}
atrilha.base-url=${BASE_URL:http://localhost:8084}

# Rate-limit de login (valores padrão)
atrilha.auth.login.max-attempts=5
atrilha.auth.login.attempt-window=15m
atrilha.auth.login.block-duration=15m

# Stub de contas-semente (InMemoryLoginAccountQuery) NAO ativo por default.
# Para ativar em dev local, definir:
#   atrilha.auth.seed.enabled=true
#   atrilha.auth.seed.teen.email=...   (etc.)
# Em producao, NUNCA ativar.
