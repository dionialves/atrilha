spring.application.name=atrilha
server.port=8084

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/
management.endpoints.web.path-mapping.health=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# E-mail transacional (US-006). Sobreposto pelos perfis dev/prod/test.
atrilha.mail.from=${MAIL_FROM:ola@atrilha.local}
atrilha.base-url=${BASE_URL:http://localhost:8084}

# OAuth2 client — Google (US-002). client-id/client-secret precisam ser
# providos via variavel de ambiente em dev/prod; defaults vazios apenas
# evitam falha de boot em ambientes que nao precisam de OAuth.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
