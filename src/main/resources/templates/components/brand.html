<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Fragments de marca (atrilha) — doc/UX/00-identidade-visual.md §3.3.

  - brand(href): renderiza o link <a class="brand"> apontando para href (ou /).
    Use em telas onde a marca também é o "ir para o início" (ex.: topbar do home).
  - brand-body: renderiza apenas o conteúdo interno (mark + wordmark) sem
    wrapper. Use dentro de um <span class="brand"> em headers de navegação,
    onde a marca não é clicável (o utilizador já está numa página pública).
-->
<a th:fragment="brand(href)"
   th:href="${href ?: '/'}"
   class="brand"
   aria-label="atrilha — página inicial">
    <th:block th:replace="~{components/brand :: brand-body}"></th:block>
</a>

<th:block th:fragment="brand-body">
    <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12 L8 4 L13 12"/>
            <circle cx="8" cy="13" r="1" fill="currentColor" stroke="none"/>
        </svg>
    </span>
    <span class="brand-wordmark">atrilha</span>
</th:block>
</body>
</html>
