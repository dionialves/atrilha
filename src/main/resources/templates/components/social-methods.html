<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Fragment: social-methods

  Stack vertical com os botões "Continuar com Google" e "Continuar com Apple",
  ambos desativados (REF-003 e decisão de produto: métodos principais ainda
  não liberados). Acompanha uma nota explicativa abaixo.

  Reaproveitado em /login e /cadastro/adolescente/escolher-metodo.

  Contratos testáveis preservados:
    - <button> (não <a>) com atributo `disabled` e `aria-disabled="true"`;
    - data-test="cta-google-disabled" no botão do Google;
    - data-test="cta-apple-disabled" no botão da Apple.
-->
<th:block th:fragment="social-methods">
    <div class="social-stack">
        <button type="button" class="btn-social"
                disabled aria-disabled="true"
                data-test="cta-google-disabled"
                title="Indisponível no momento">
            <svg class="logo-google" aria-hidden="true" focusable="false"
                 xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
            </svg>
            <span>Continuar com Google</span>
        </button>

        <button type="button" class="btn-social"
                disabled aria-disabled="true"
                data-test="cta-apple-disabled"
                title="Indisponível no momento">
            <svg class="logo-apple" aria-hidden="true" focusable="false" viewBox="0 0 24 24">
                <path fill="#1A1614" d="M16.365 1.43c0 1.14-.417 2.2-1.25 3.18-1.005 1.16-2.22 1.84-3.54 1.73a3.6 3.6 0 0 1-.027-.43c0-1.094.476-2.26 1.32-3.214.42-.48.957-.88 1.61-1.196.65-.317 1.266-.49 1.848-.52.02.224.029.448.029.67zM21.6 17.12c-.32.74-.47 1.07-.88 1.72-.57.91-1.38 2.04-2.38 2.05-.89.01-1.12-.58-2.33-.57-1.21.01-1.46.58-2.35.57-1-.01-1.77-1.03-2.34-1.94-1.6-2.55-1.77-5.54-.78-7.13.7-1.13 1.81-1.79 2.85-1.79 1.06 0 1.73.58 2.61.58.85 0 1.37-.58 2.6-.58.93 0 1.91.5 2.61 1.37-2.29 1.26-1.92 4.53.79 5.7z"/>
            </svg>
            <span>Continuar com Apple</span>
        </button>
    </div>
    <p class="social-note">Entrar com Google e Apple está indisponível no momento.</p>
</th:block>
</body>
</html>
