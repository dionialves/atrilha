<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/public}"
    lang="pt-BR"
>
    <head>
        <title>Entrar — atrilha</title>
    </head>
    <body>
        <th:block layout:fragment="content">
            <!-- Header expanded — botão voltar (para a home) + marca. -->
            <header
                th:replace="~{layout/fragments/public-header :: public-header(@{/}, 'Voltar para o início')}"
            ></header>

            <!-- Main — formulário de login. -->
            <main class="login">
                <!-- Banners de estado server-side (contrato testável: data-error / data-state) -->
                <div
                    th:if="${errorState == 'bad-credentials'}"
                    role="alert"
                    data-error="bad-credentials"
                    class="alert alert--error login__alert"
                >
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <circle cx="12" cy="12" r="9" />
                        <path d="M12 8v5" />
                        <circle cx="12" cy="16.5" r="0.6" fill="currentColor" />
                    </svg>
                    <span
                        >E-mail ou senha incorretos. Confira e tente de
                        novo.</span
                    >
                </div>
                <div
                    th:if="${errorState == 'rate-limited'}"
                    role="alert"
                    data-error="rate-limited"
                    class="alert alert--warning login__alert"
                >
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <circle cx="12" cy="12" r="9" />
                        <path d="M12 7v5l3 3" />
                    </svg>
                    <span
                        >Muitas tentativas em pouco tempo. Espera alguns minutos
                        e tenta de novo.</span
                    >
                </div>
                <div
                    th:if="${infoState == 'logged-out'}"
                    role="status"
                    data-state="logged-out"
                    class="alert alert--info login__alert"
                >
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <path d="M9 12h11M16 8l4 4-4 4" />
                        <path d="M12 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h6" />
                    </svg>
                    <span>Você saiu. Volta quando quiser.</span>
                </div>

                <div class="login__intro">
                    <p class="overline">Bem-vinda de volta</p>
                    <h1>Entrar</h1>
                    <p class="login__lead">
                        Use o mesmo método que escolheu no cadastro.
                    </p>
                </div>

                <!-- Formulário e-mail + senha — contrato funcional intacto. -->
                <form
                    th:action="@{/login}"
                    method="post"
                    class="login__form"
                    novalidate
                    x-data="{ showPassword: false }"
                >
                    <!-- Token CSRF -->
                    <input
                        type="hidden"
                        th:if="${_csrf}"
                        th:name="${_csrf.parameterName}"
                        th:value="${_csrf.token}"
                    />

                    <!-- E-mail -->
                    <div class="input-group">
                        <label for="username" class="input-label">E-mail</label>
                        <input
                            id="username"
                            type="email"
                            name="username"
                            inputmode="email"
                            autocomplete="email"
                            required
                            maxlength="255"
                            placeholder="voce@exemplo.com"
                            th:attr="disabled=${errorState == 'rate-limited' ? 'disabled' : null}"
                            class="input-field"
                        />
                    </div>

                    <!-- Senha (com toggle "mostrar senha" via Alpine) -->
                    <div class="input-group">
                        <label for="password" class="input-label">Senha</label>
                        <div class="login__password-row">
                            <input
                                id="password"
                                name="password"
                                :type="showPassword ? 'text' : 'password'"
                                autocomplete="current-password"
                                required
                                minlength="8"
                                maxlength="72"
                                placeholder="Sua senha"
                                th:attr="disabled=${errorState == 'rate-limited' ? 'disabled' : null}"
                                class="input-field login__password-input"
                            />
                            <button
                                type="button"
                                class="login__password-toggle"
                                @click="showPassword = !showPassword"
                                :aria-label="showPassword ? 'Esconder senha' : 'Mostrar senha'"
                                :aria-pressed="showPassword.toString()"
                            >
                                <span x-show="!showPassword">Mostrar</span>
                                <span x-show="showPassword" x-cloak
                                    >Esconder</span
                                >
                            </button>
                        </div>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary btn-lg btn--block"
                        th:attr="disabled=${errorState == 'rate-limited' ? 'disabled' : null}"
                    >
                        Entrar
                    </button>
                </form>

                <!-- Divisor "ou" -->
                <div class="login__divider" aria-hidden="true">
                    <span>ou</span>
                </div>

                <!--
          Métodos sociais — Google e Apple, ambos desativados (REF-003 e
          decisão de produto). Renderizados pelo fragmento social-methods
          (preserva data-test="cta-google-disabled" / "cta-apple-disabled").
        -->
                <th:block
                    th:replace="~{components/social-methods :: social-methods}"
                ></th:block>

                <!-- Links de apoio. -->
                <nav class="login__links" aria-label="Mais opções">
                    <a
                        class="login__link login__link--muted"
                        th:href="@{/esqueci-senha}"
                        >Esqueci minha senha</a
                    >
                    <a class="login__link" th:href="@{/comecar}">
                        Ainda não tem conta?
                        <span class="login__link-strong"> Criar conta</span>
                    </a>
                </nav>
            </main>
        </th:block>
    </body>
</html>
