<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      lang="pt-BR">
<head>
    <title>Entrar — atrilha</title>
</head>
<body>
<section layout:fragment="content" class="login">

    <!-- Banners (contrato testável: data-error / data-state) -->
    <div th:if="${errorState == 'bad-credentials'}"
         role="alert"
         data-error="bad-credentials"
         class="alert alert--error">
        E-mail ou senha incorretos.
    </div>
    <div th:if="${errorState == 'rate-limited'}"
         role="alert"
         data-error="rate-limited"
         class="alert alert--warning">
        Muitas tentativas em pouco tempo. Espera alguns minutos e tenta de novo.
    </div>
    <div th:if="${infoState == 'logged-out'}"
         role="status"
         data-state="logged-out"
         class="alert alert--info">
        Você saiu. Volta quando quiser.
    </div>

    <header class="login__intro">
        <p class="overline">Bem-vinda de volta</p>
        <h1>Entrar</h1>
        <p class="login__lead">Use o método que escolheu no cadastro.</p>
    </header>

    <form th:action="@{/login}" method="post" class="login__form" novalidate
          x-data="{ showPassword: false }">

        <!-- Token CSRF -->
        <input type="hidden" th:if="${_csrf}"
               th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- E-mail -->
        <div class="input-group">
            <label for="username" class="input-label">E-mail</label>
            <input id="username" type="email" name="username"
                   autocomplete="email" required maxlength="255"
                   th:attr="disabled=${errorState == 'rate-limited' ? 'disabled' : null}"
                   class="input-field"/>
        </div>

        <!-- Senha (com toggle "mostrar senha" via Alpine) -->
        <div class="input-group">
            <label for="password" class="input-label">Senha</label>
            <div class="input-group__row">
                <input id="password" name="password"
                       :type="showPassword ? 'text' : 'password'"
                       autocomplete="current-password" required minlength="8" maxlength="72"
                       th:attr="disabled=${errorState == 'rate-limited' ? 'disabled' : null}"
                       class="input-field"/>
                <button type="button" class="input-group__toggle"
                        @click="showPassword = !showPassword"
                        :aria-label="showPassword ? 'Esconder senha' : 'Mostrar senha'"
                        :aria-pressed="showPassword.toString()">
                    <span x-show="!showPassword">Mostrar</span>
                    <span x-show="showPassword" x-cloak>Esconder</span>
                </button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full"
                th:attr="disabled=${errorState == 'rate-limited' ? 'disabled' : null}">
            Entrar
        </button>
    </form>

    <div class="login__divider" aria-hidden="true"><span>ou</span></div>

    <!-- Botao Google: descontinuado (REF-003). Mantido visualmente, inerte. -->
    <button type="button"
            class="btn-google"
            disabled
            aria-disabled="true"
            data-test="cta-google-disabled"
            title="Indisponivel">
        <svg class="btn-google__logo" aria-hidden="true" focusable="false"
             xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        <span>Continuar com Google</span>
    </button>

    <p class="login__forgot">
        <a th:href="@{/esqueci-senha}">Esqueci minha senha</a>
    </p>

    <p class="login__back">
        <a th:href="@{/}">Voltar pro início</a>
    </p>
</section>
</body>
</html>
