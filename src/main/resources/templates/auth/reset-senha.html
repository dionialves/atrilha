<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/public}"
    lang="pt-BR"
>
    <head>
        <title th:text="#{password.reset.page.title}">Redefinir senha — atrilha</title>
    </head>
    <body>
        <th:block layout:fragment="content">

            <!-- Header expandido — botão voltar (para o login) + marca. -->
            <header
                th:replace="~{layout/fragments/public-header :: public-header(@{/login}, 'Voltar para o login')}"
            ></header>

            <main class="login">

                <!-- Tela: link expirado ou inválido -->
                <div th:if="${outcome == 'EXPIRED_OR_INVALID'}"
                     class="max-w-md mx-auto mt-16 p-6 bg-white rounded-xl shadow-lg">
                    <h1 class="text-2xl font-bold text-gray-900 mb-3"
                        th:text="#{password.reset.expired.title}">
                        Link expirado
                    </h1>
                    <p class="text-gray-600 mb-6"
                       th:text="#{password.reset.expired.body}">
                        Este link de redefinição de senha expirou ou não é mais válido.
                    </p>
                    <a th:href="@{/esqueci-senha}"
                       class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors"
                       th:text="#{password.reset.expired.cta}">
                        Solicitar um novo link
                    </a>
                </div>

                <!-- Tela: link já utilizado -->
                <div th:if="${outcome == 'ALREADY_USED'}"
                     class="max-w-md mx-auto mt-16 p-6 bg-white rounded-xl shadow-lg">
                    <h1 class="text-2xl font-bold text-gray-900 mb-3"
                        th:text="#{password.reset.used.title}">
                        Link já utilizado
                    </h1>
                    <p class="text-gray-600 mb-6"
                       th:text="#{password.reset.used.body}">
                        A senha já foi redefinida com este link.
                    </p>
                    <a th:href="@{/login}"
                       class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors"
                       th:text="#{password.reset.used.cta}">
                        Ir para o login
                    </a>
                </div>

                <!-- Formulário de nova senha -->
                <div th:if="${outcome == 'SUCCESS'}"
                     class="max-w-md mx-auto mt-16 p-6 bg-white rounded-xl shadow-lg">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2"
                        th:text="#{password.reset.form.title}">
                        Redefinir senha
                    </h1>
                    <p class="text-gray-500 text-sm mb-6"
                       th:text="#{password.reset.form.description}">
                        Digite sua nova senha abaixo.
                    </p>

                    <form th:action="@{/reset-senha}"
                          method="post"
                          th:object="${resetForm}"
                          x-data="{ showPassword: false }">

                        <!-- Token preservado entre GET e POST -->
                        <input type="hidden" th:field="*{token}" th:value="${token}"/>

                        <!-- Erros de validação do campo -->
                        <div th:if="${#fields.hasErrors('newPassword')}"
                             class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"
                             role="alert">
                            <span th:errors="*{newPassword}">Erro de validação</span>
                        </div>

                        <div class="mb-4">
                            <label for="newPassword"
                                   class="block text-sm font-medium text-gray-700 mb-1"
                                   th:text="#{password.reset.form.password.label}">
                                Nova senha
                            </label>
                            <div class="relative">
                                <input id="newPassword"
                                       name="newPassword"
                                       :type="showPassword ? 'text' : 'password'"
                                       th:field="*{newPassword}"
                                       autocomplete="new-password"
                                       required
                                       minlength="8"
                                       maxlength="72"
                                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                       th:placeholder="#{password.reset.form.password.placeholder}"/>
                                <button type="button"
                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-indigo-600"
                                        @click="showPassword = !showPassword"
                                        :aria-label="showPassword ? 'Esconder senha' : 'Mostrar senha'"
                                        :aria-pressed="showPassword.toString()">
                                    <span x-show="!showPassword">Mostrar</span>
                                    <span x-show="showPassword" x-cloak>Esconder</span>
                                </button>
                            </div>
                            <p class="text-gray-500 text-xs mt-1"
                               th:text="#{password.reset.form.password.hint}">
                                Mínimo 8 caracteres.
                            </p>
                        </div>

                        <button type="submit"
                                class="w-full py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors"
                                th:text="#{password.reset.form.submit}">
                            Redefinir senha
                        </button>
                    </form>
                </div>

            </main>

        </th:block>
    </body>
</html>
