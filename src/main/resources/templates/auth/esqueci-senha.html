<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/public}"
    lang="pt-BR"
>
    <head>
        <title th:text="#{password-reset.page.title}">Esqueci minha senha — atrilha</title>
    </head>
    <body>
        <th:block layout:fragment="content">

            <!-- Header expandido — botão voltar (para a home) + marca. -->
            <header
                th:replace="~{layout/fragments/public-header :: public-header(@{/}, 'Voltar para o início')}"
            ></header>

            <main class="login">

                <!-- Mensagem de sucesso (após redirect com flash) -->
                <div th:if="${sent}" role="status" class="alert alert--success login__alert">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        aria-hidden="true"
                    >
                        <path d="M9 12l2 2 4-4" />
                        <circle cx="12" cy="12" r="9" />
                    </svg>
                    <div>
                        <p class="login__intro" style="margin-bottom: var(--space-6)">
                            <span class="overline">E-mail enviado</span>
                            <h1 th:text="#{password-reset.success.heading}">Verifique seu e-mail</h1>
                        </p>
                        <p class="login__lead"
                           th:text="#{password-reset.success.message}"
                           style="margin-bottom: var(--space-6)">
                            Se este e-mail estiver cadastrado, enviamos um link para redefinir sua senha.
                        </p>
                        <a th:href="@{/login}"
                           class="btn btn-primary btn-lg btn--block"
                           th:text="#{password-reset.success.backLink}">
                            Voltar ao login
                        </a>
                    </div>
                </div>

                <!-- Formulário (primeira visita ou erro de validação) -->
                <div th:unless="${sent}">
                    <header class="login__intro">
                        <p class="overline">Recuperar acesso</p>
                        <h1 th:text="#{password-reset.form.heading}">Esqueci minha senha</h1>
                        <p class="login__lead"
                           th:text="#{password-reset.form.instructions}">
                            Informe seu e-mail para receber um link de redefinição.
                        </p>
                    </header>

                    <form th:action="@{/esqueci-senha}" method="post" th:object="${request}" class="login__form">

                        <!-- E-mail -->
                        <div class="input-group" th:classappend="${#fields.hasErrors('email')} ? 'input-group--error' : ''">
                            <label for="email" class="input-label" th:text="#{password-reset.form.emailLabel}">E-mail</label>
                            <input id="email" type="email" name="email" th:field="*{email}"
                                   th:attr="aria-invalid=${#fields.hasErrors('email')}, aria-describedby=${#fields.hasErrors('email')} ? 'email-error' : null"
                                   class="input-field" maxlength="255"
                                   placeholder="seu@email.com"
                                   autocomplete="email"/>
                            <span th:if="${#fields.hasErrors('email')}" id="email-error" class="input-error" role="alert"
                                  th:errors="*{email}">Erro de validação</span>
                        </div>

                        <button type="submit"
                                class="btn btn-primary btn-lg btn--block"
                                th:text="#{password-reset.form.submit}">
                            Enviar link de redefinição
                        </button>
                    </form>

                    <!-- Links de apoio. -->
                    <nav class="login__links" aria-label="Mais opções">
                        <a class="login__link login__link--muted" th:href="@{/login}"
                           th:text="#{password-reset.form.backLink}">
                            Voltar ao login
                        </a>
                    </nav>
                </div>

            </main>

        </th:block>
    </body>
</html>
