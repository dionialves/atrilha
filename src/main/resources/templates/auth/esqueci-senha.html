<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/public}"
    lang="pt-BR"
>
    <head>
        <title th:text="#{password-reset.page.title}">Esqueci minha senha — atrilha</title>
    </head>
    <body>
        <th:block layout:fragment="content">

            <!-- Header expandido — botão voltar (para a home) + marca. -->
            <header
                th:replace="~{layout/fragments/public-header :: public-header(@{/}, 'Voltar para o início')}"
            ></header>

            <main class="login">
                <!-- Mensagem de sucesso (após redirect com flash) -->
                <div th:if="${sent}" class="max-w-md mx-auto mt-16 p-6 bg-white rounded-xl shadow-lg">
                    <h1 class="text-2xl font-bold text-gray-900 mb-4"
                        th:text="#{password-reset.success.heading}">
                        Verifique seu e-mail
                    </h1>
                    <p class="text-gray-600 mb-6"
                       th:text="#{password-reset.success.message}">
                        Se este e-mail estiver cadastrado, enviamos um link para redefinir sua senha.
                    </p>
                    <a th:href="@{/login}"
                       class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors">
                        <span th:text="#{password-reset.success.backLink}">Voltar ao login</span>
                    </a>
                </div>

                <!-- Formulário (primeira visita ou erro de validação) -->
                <div th:unless="${sent}" class="max-w-md mx-auto mt-16 p-6 bg-white rounded-xl shadow-lg">
                    <h1 class="text-2xl font-bold text-gray-900 mb-2"
                        th:text="#{password-reset.form.heading}">
                        Esqueci minha senha
                    </h1>
                    <p class="text-gray-500 text-sm mb-6"
                       th:text="#{password-reset.form.instructions}">
                        Informe seu e-mail para receber um link de redefinição.
                    </p>

                    <form th:action="@{/esqueci-senha}" method="post" th:object="${request}">

                        <!-- Erros de validação do campo -->
                        <div th:if="${#fields.hasErrors('email')}"
                             class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700"
                             role="alert">
                            <span th:errors="*{email}">Erro de validação</span>
                        </div>

                        <div class="mb-4">
                            <label for="email"
                                   class="block text-sm font-medium text-gray-700 mb-1"
                                   th:text="#{password-reset.form.emailLabel}">
                                E-mail
                            </label>
                            <input type="email" id="email" name="email" th:field="*{email}"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                   placeholder="seu@email.com"
                                   autocomplete="email">
                        </div>

                        <button type="submit"
                                class="w-full py-3 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-colors"
                                th:text="#{password-reset.form.submit}">
                            Enviar link de redefinição
                        </button>
                    </form>

                    <p class="text-center text-sm text-gray-500 mt-4">
                        <a th:href="@{/login}" class="text-indigo-600 hover:underline"
                           th:text="#{password-reset.form.backLink}">
                            Voltar ao login
                        </a>
                    </p>
                </div>
            </main>

        </th:block>
    </body>
</html>
