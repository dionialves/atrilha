<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public}"
      lang="pt-BR">
<head><title>Como você quer entrar?</title></head>
<body>
<th:block layout:fragment="content">

    <!-- Header — voltar + marca (fora do wrapper de conteúdo para ocupar
         a largura total da viewport). -->
    <header th:replace="~{layout/fragments/public-header :: public-header(@{/comecar}, 'Voltar para a escolha de caminho')}"></header>

    <!-- Main — conteúdo com largura limitada. -->
    <main class="escolher-metodo">

        <div class="escolher-metodo__intro">
            <p class="overline">Cadastro · Adolescente</p>
            <h1>Como você quer entrar?</h1>
            <p>
                Crie sua conta com Google ou Apple — é o caminho mais rápido. Você
                também pode usar e-mail e senha.
            </p>
        </div>

        <!-- Métodos principais: Google e Apple (desativados) -->
        <th:block th:replace="~{components/social-methods :: social-methods}"></th:block>

        <div class="divider" aria-hidden="true">ou</div>

        <!-- Caminho ativo: cadastro por e-mail -->
        <a class="btn-email" th:href="@{/cadastro/adolescente}">
            Cadastrar com e-mail e senha
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
        </a>

        <!-- Aviso calmo sobre vinculação do responsável -->
        <div class="note" role="note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 11v5"/>
                <circle cx="12" cy="7.5" r="0.6" fill="currentColor"/>
            </svg>
            <p>
                Depois do cadastro, sua conta fica ativa quando um responsável
                confirma a vinculação.
            </p>
        </div>

        <p class="back-link">
            <a th:href="@{/comecar}">Voltar pro começo</a>
        </p>

    </main>

</th:block>
</body>
</html>
