<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public}"
      lang="pt-BR">
<head><title>Sem permissão</title></head>
<body>
<th:block layout:fragment="content">

    <header th:replace="~{layout/fragments/public-header :: public-header-brand}"></header>

    <main class="error-page">
        <p class="error-page__code">403</p>
        <h1 class="error-page__title">Sem permissão</h1>
        <p class="error-page__lead">Voce nao tem permissao para acessar esta pagina. Volte ao inicio.</p>
        <div class="error-page__links">
            <a th:href="@{/}">Voltar para o inicio</a>
            <a th:href="@{/login}">Fazer login</a>
        </div>
    </main>

</th:block>
</body>
</html>
