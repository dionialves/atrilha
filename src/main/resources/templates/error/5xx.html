<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/public}"
      lang="pt-BR">
<head><title>Erro interno</title></head>
<body>
<th:block layout:fragment="content">

    <header th:replace="~{layout/fragments/public-header :: public-header-brand}"></header>

    <main class="error-page">
        <p class="error-page__code">500</p>
        <h1 class="error-page__title">Algo deu errado</h1>
        <p class="error-page__lead">Algo deu errado. Tente novamente em instantes.</p>
        <a th:href="@{/}" class="error-page__link">Voltar para o início</a>
    </main>

</th:block>
</body>
</html>
