<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}"
      lang="pt-BR">
<head>
    <title>Inserir código — atrilha</title>
</head>
<body>
<section layout:fragment="content" class="placeholder placeholder--vincular">
    <h1>Insira o código da adolescente</h1>
    <p>Peça à adolescente o código de 6 caracteres e digite abaixo.
       (Placeholder — a tela real chega em breve.)</p>

    <!-- 6 inputs decorativos (disabled) — sem JS de avanço automático ainda -->
    <div class="codigo-grid" aria-label="Código de 6 caracteres">
        <input type="text" maxlength="1" disabled aria-label="Caractere 1"/>
        <input type="text" maxlength="1" disabled aria-label="Caractere 2"/>
        <input type="text" maxlength="1" disabled aria-label="Caractere 3"/>
        <input type="text" maxlength="1" disabled aria-label="Caractere 4"/>
        <input type="text" maxlength="1" disabled aria-label="Caractere 5"/>
        <input type="text" maxlength="1" disabled aria-label="Caractere 6"/>
    </div>

    <button type="button" class="btn btn-primary btn-lg" disabled
            aria-disabled="true">Em breve</button>

    <form th:action="@{/logout}" method="post" class="placeholder__logout">
        <input type="hidden" th:if="${_csrf}"
               th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-ghost btn-md">Sair</button>
    </form>
</section>
</body>
</html>
